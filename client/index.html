<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Chat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding:
                10px; margin-bottom: 10px; }
        input { padding: 8px; margin-right: 5px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
<h2>Game Chat Room</h2>

<div id="login">
    <input id="username" placeholder="Username" />
    <input id="room" placeholder="Room (e.g. room1)" />
    <button onclick="joinRoom()">Join</button>
</div>

<div id="chat" style="display:none">
    <div id="messages"></div>
    <input id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    let ws;

    function joinRoom() {
        const username = document.getElementById('username').value;
        const room = document.getElementById('room').value;
        if (!username || !room) return alert('Fill in all fields');

        ws = new WebSocket('ws://localhost:3000');

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', username, room }));
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const messages = document.getElementById('messages');
            messages.innerHTML += `<p><b>${data.username}:</b> ${data.message}</p>`;
            messages.scrollTop = messages.scrollHeight;
        };
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input.value) return;
        ws.send(JSON.stringify({ type: 'chat', message: input.value }));
        input.value = '';
    }
</script>
</body>
</html>
